apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: grafana-cloud
    creationPolicy: Owner
  data:
    # The onepasswordSDK provider does NOT support a separate `property` field;
    # the field is encoded into `key` using 1Password secret-reference syntax
    # `<item>/[section/]<field>`. The vault (Frankenstructure) is supplied by the
    # ClusterSecretStore, so it is omitted here. These map 1:1 to the previous
    # op:// refs: op://Frankenstructure/Grafana Cloud API Key - fungi/credential
    # and .../username.
    - secretKey: api-key
      remoteRef:
        key: Grafana Cloud API Key - fungi/credential
    - secretKey: instance-id
      remoteRef:
        key: Grafana Cloud API Key - fungi/username
