apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: musync-onepassword
  namespace: musync
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: musync-onepassword
    creationPolicy: Owner
  # The onepasswordSDK provider does NOT support a separate `property` field; the
  # field is encoded into `key` using 1Password secret-reference syntax
  # `<item>/[section/]<field>`. The vault (Frankenstructure) is supplied by the
  # ClusterSecretStore, so it is omitted here. secretKeys are the exact env var
  # names FsConfig reads (Config.fs): Smtp.Username -> SMTP_USERNAME, etc.
  data:
    - secretKey: SONGKICK_ICS_URL
      remoteRef:
        key: Songkick - Musync/ics_url
    - secretKey: SETLIST_FM_API_KEY
      remoteRef:
        key: Setlist.fm API Key - Musync/credential
    # The user's own Proton mailbox — RECIPIENT of the calendar self-invite AND
    # the setlist nudge (Config.UserEmail -> USER_EMAIL). MUST exist in 1Password
    # before deploy or ESO sync fails loud (verify item/field at live-apply).
    - secretKey: USER_EMAIL
      remoteRef:
        key: User - Musync/email
    - secretKey: SMTP_HOST
      remoteRef:
        key: SMTP Relay - Musync/host
    - secretKey: SMTP_PORT
      remoteRef:
        key: SMTP Relay - Musync/port
    - secretKey: SMTP_USERNAME
      remoteRef:
        key: SMTP Relay - Musync/username
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: SMTP Relay - Musync/password
    - secretKey: SMTP_FROM
      remoteRef:
        key: SMTP Relay - Musync/from
    - secretKey: DEADMAN_POLL_SONGKICK_URL
      remoteRef:
        key: Healthchecks - Musync/poll_songkick_url
    - secretKey: DEADMAN_CURATE_PRESHOW_URL
      remoteRef:
        key: Healthchecks - Musync/curate_preshow_url
