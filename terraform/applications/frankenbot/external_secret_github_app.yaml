apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frankenbot-github-app
  namespace: frankenbot
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: frankenbot-github-app
    creationPolicy: Owner
  # secretKey names MUST match the env vars frankenbot/githubapp.py reads.
  data:
    - secretKey: FRANKENBOT_APP_ID
      remoteRef:
        key: GitHub App - Frankenbot/app id
    - secretKey: FRANKENBOT_APP_INSTALLATION_ID
      remoteRef:
        key: GitHub App - Frankenbot/installation id
    - secretKey: FRANKENBOT_APP_PRIVATE_KEY
      remoteRef:
        key: GitHub App - Frankenbot/private key
