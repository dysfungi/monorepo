# mise environment configuration for the monorepo.
#
# CACHING STRATEGY:
#   Remote secrets (op read, curl): 24h TTL via exec() cache_key+cache_duration.
#   Vultr-derived values (AWS_*, REGISTRY): no-TTL exec() cache_key (same semantics
#     as the former secrets/frankenstorage.yaml and secrets/frankistry.json files,
#     but shared cross-terminal via ~/.cache/mise instead of per-repo files).
#   All cache is per-machine in ~/.cache/mise and shared across all terminals.
#   To force refresh: `mise cache clear` (all), or per-key: not supported directly.
#   To refresh kubeconfig: rm secrets/frank8s.yaml (hooks.enter re-creates it).
#
# QUOTING NOTE: exec(command=...) values use TOML double-quoted strings so that
#   op:// references containing spaces can be wrapped in single quotes within the
#   shell command, e.g. exec(command="op read 'op://vault/item with spaces/field'").
#   Vultr jq commands use backslash-escaped inner double quotes.
#
# WHAT MOVED WHERE vs the old .envrc:
#   Secret fetches  → [env] exec() with cache_key (this file)
#   File bootstrap + docker login → .mise/setup.sh (hooks.enter, guarded)
#   secrets/frankenstorage.yaml, secrets/frankistry.json → deleted (values cached here)
#   SMTP_CONFIG block → dropped (was dead code; never exported)
#   watch_file → dropped (no equivalent; use `mise cache clear` to refresh)

[settings]
experimental = true  # required for exec() template caching in [env]

[env]
# Optional local dotenv — skipped silently if absent (no .env required)
_.file = ".env"

# ── Identity & static paths ──────────────────────────────────────────────────
GITHUB_USERNAME = "{{ exec(command='git config --get user.email') }}"
KUBECONFIG_PATH = "{{ config_root }}/secrets/frank8s.yaml"
KUBECONFIG      = "{{ config_root }}/secrets/frank8s.yaml"

# ── Remote secrets (24h TTL, cross-terminal) ─────────────────────────────────
VULTR_API_KEY        = "{{ exec(command=\"op read 'op://Frankenstructure/Vultr API Key/password'\", cache_key='vultr_api_key', cache_duration='24h') }}"
CLOUDFLARE_API_TOKEN = "{{ exec(command=\"op read 'op://Frankenstructure/Cloudflare API Token - frankenstructure/credential'\", cache_key='cloudflare_token', cache_duration='24h') }}"

# ── Vultr-derived values (no-TTL cache; replaces secrets/frankenstorage.yaml
#    and secrets/frankistry.json; requires VULTR_API_KEY in env) ──────────────
AWS_ACCESS_KEY_ID     = "{{ exec(command='vultr --output=json object-storage list | jq -r \".object_storages[] | select(.label == \\\"frankenstorage\\\") | .s3_access_key\"', cache_key='aws_akid') }}"
AWS_SECRET_ACCESS_KEY = "{{ exec(command='vultr --output=json object-storage list | jq -r \".object_storages[] | select(.label == \\\"frankenstorage\\\") | .s3_secret_key\"', cache_key='aws_secret') }}"
REGISTRY              = "{{ exec(command='vultr --output=json container-registry list | jq -r \".registries[] | select(.name == \\\"frankistry\\\") | .urn\"', cache_key='registry_urn') }}"

# ── OpenTofu / Terraform variables ───────────────────────────────────────────
TF_VAR_automate_dropbox_client_id      = "{{ exec(command=\"op read 'op://Frankenstructure/Dropbox App - Automatox/username'\", cache_key='tf_dropbox_id', cache_duration='24h') }}"
TF_VAR_automate_dropbox_client_secret  = "{{ exec(command=\"op read 'op://Frankenstructure/Dropbox App - Automatox/credential'\", cache_key='tf_dropbox_secret', cache_duration='24h') }}"
TF_VAR_automate_postgres_password      = "{{ exec(command=\"op read 'op://Frankenstructure/Postgres - AutoMate/password'\", cache_key='tf_automate_pg_pw', cache_duration='24h') }}"
TF_VAR_automate_todoist_client_id      = "{{ exec(command=\"op read 'op://Frankenstructure/Todoist App - AutoMate/username'\", cache_key='tf_todoist_id', cache_duration='24h') }}"
TF_VAR_automate_todoist_client_secret  = "{{ exec(command=\"op read 'op://Frankenstructure/Todoist App - AutoMate/credential'\", cache_key='tf_todoist_secret', cache_duration='24h') }}"
TF_VAR_automate_todoist_verification_token = "{{ exec(command=\"op read 'op://Frankenstructure/Todoist App - AutoMate/verification token'\", cache_key='tf_todoist_vtoken', cache_duration='24h') }}"
TF_VAR_cloudflare_api_token            = "{{ exec(command=\"op read 'op://Frankenstructure/Cloudflare API Token - frankenstructure/credential'\", cache_key='cloudflare_token', cache_duration='24h') }}"
TF_VAR_discord_webhook_alerts          = "{{ exec(command=\"op read 'op://Frankenstructure/Discord Webhook - breaktheloop/url'\", cache_key='tf_discord_webhook', cache_duration='24h') }}"
TF_VAR_dockerconfigjson                = "{{ exec(command=\"op read 'op://Frankenstructure/Vultr Container Registry - Frankistry/credential'\", cache_key='tf_dockerconfigjson', cache_duration='24h') }}"
TF_VAR_exporter_postgres_password      = "{{ exec(command=\"op read 'op://Frankenstructure/Postgres - Exporter/password'\", cache_key='tf_exporter_pg_pw', cache_duration='24h') }}"
TF_VAR_github_username                 = "{{ exec(command='git config --get user.email') }}"
TF_VAR_github_token                    = "{{ exec(command=\"op read 'op://Frankenstructure/GitHub Token - ghcr.io/token'\", cache_key='github_token', cache_duration='24h') }}"
TF_VAR_grafana_cloud_instance_id       = "{{ exec(command=\"op read 'op://Frankenstructure/Grafana Cloud API Key - fungi/username'\", cache_key='tf_grafana_instance_id', cache_duration='24h') }}"
TF_VAR_grafana_cloud_api_key           = "{{ exec(command=\"op read 'op://Frankenstructure/Grafana Cloud API Key - fungi/credential'\", cache_key='tf_grafana_api_key', cache_duration='24h') }}"
TF_VAR_grafana_admin_password          = "{{ exec(command=\"op read 'op://Frankenstructure/Grafana - frank.sh/password'\", cache_key='tf_grafana_admin_pw', cache_duration='24h') }}"
TF_VAR_healthchecksio_api_key          = "{{ exec(command=\"op read 'op://Frankenstructure/Healthchecks.io API Key/credential'\", cache_key='tf_healthchecks_key', cache_duration='24h') }}"
TF_VAR_home_ip                         = "{{ exec(command='curl --silent icanhazip.com', cache_key='home_ip', cache_duration='24h') }}"
TF_VAR_honeycomb_key_id                = "{{ exec(command=\"op read 'op://Frankenstructure/Honeycomb.io Management API Key/username'\", cache_key='tf_honeycomb_id', cache_duration='24h') }}"
TF_VAR_honeycomb_key_secret            = "{{ exec(command=\"op read 'op://Frankenstructure/Honeycomb.io Management API Key/credential'\", cache_key='tf_honeycomb_secret', cache_duration='24h') }}"
TF_VAR_honeycomb_api_key               = "{{ exec(command=\"op read 'op://CLI/Honeycomb Configuration API Key - AI/credential'\", cache_key='tf_honeycomb_api_key', cache_duration='24h') }}"
TF_VAR_kubeconfig_path                 = "{{ config_root }}/secrets/frank8s.yaml"
TF_VAR_miniflux_admin_username         = "{{ exec(command=\"op read 'op://Frankenstructure/Miniflux - frank.sh/username'\", cache_key='tf_miniflux_user', cache_duration='24h') }}"
TF_VAR_miniflux_admin_password         = "{{ exec(command=\"op read 'op://Frankenstructure/Miniflux - frank.sh/password'\", cache_key='tf_miniflux_pw', cache_duration='24h') }}"
TF_VAR_miniflux_postgres_password      = "{{ exec(command=\"op read 'op://Frankenstructure/Postgres - Miniflux/password'\", cache_key='tf_miniflux_pg_pw', cache_duration='24h') }}"
TF_VAR_smtp_password                   = "{{ exec(command=\"op read 'op://Frankenstructure/ProtonMail SMTP - Monitoring/SMTP/password'\", cache_key='tf_smtp_pw', cache_duration='24h') }}"
TF_VAR_smtp_port                       = "{{ exec(command=\"op read 'op://Frankenstructure/ProtonMail SMTP - Monitoring/SMTP/port'\", cache_key='tf_smtp_port', cache_duration='24h') }}"
TF_VAR_smtp_server                     = "{{ exec(command=\"op read 'op://Frankenstructure/ProtonMail SMTP - Monitoring/SMTP/server'\", cache_key='tf_smtp_server', cache_duration='24h') }}"
TF_VAR_smtp_username                   = "{{ exec(command=\"op read 'op://Frankenstructure/ProtonMail SMTP - Monitoring/SMTP/username'\", cache_key='tf_smtp_user', cache_duration='24h') }}"
TF_VAR_todoist_email                   = "{{ exec(command=\"op read 'op://Frankenstructure/Todoist Project - Frankenstructure/email'\", cache_key='tf_todoist_email', cache_duration='24h') }}"
TF_VAR_vultr_api_key                   = "{{ exec(command=\"op read 'op://Frankenstructure/Vultr API Key/password'\", cache_key='vultr_api_key', cache_duration='24h') }}"

[[hooks.enter]]
# Use `run` (not `script`) so the path is evaluated by the shell at runtime.
# `script` resolves relative to CWD, which breaks when entering the project
# from a subdirectory. MISE_PROJECT_ROOT is injected by mise into the hook
# environment and always points to the directory containing .mise.toml.
run = '"$MISE_PROJECT_ROOT/.mise/setup.sh"'
