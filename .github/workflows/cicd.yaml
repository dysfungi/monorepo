name: Continuous Integration & Deployment

on:
  push:
    branches:
      - main
  pull_request:

permissions: read-all

jobs:
  lint:
    uses: ./.github/workflows/lint.yaml

  changes:
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.filter.outputs.any }}
      httpbin: ${{ steps.filter.outputs.httpbin }}
      miniflux: ${{ steps.filter.outputs.miniflux }}
      node-red: ${{ steps.filter.outputs.node-red }}
      ollama: ${{ steps.filter.outputs.ollama }}
      automate: ${{ steps.filter.outputs.automate }}
      musync: ${{ steps.filter.outputs.musync }}
      ntfy: ${{ steps.filter.outputs.ntfy }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            any:
              - 'terraform/infrastructure/**'
              - 'terraform/applications/**'
              - 'terraform/modules/**'
              - 'fsharp/api/automate/**'
              - 'fsharp/api/musync/**'
              - '.github/workflows/cicd.yaml'
              - '.mise.toml'
            httpbin:
              - 'terraform/applications/httpbin/**'
              - 'terraform/modules/gateway-route/**'
              - '.github/workflows/cicd.yaml'
            ntfy:
              - 'terraform/applications/ntfy/**'
              - 'terraform/modules/gateway-route/**'
            miniflux:
              - 'terraform/applications/miniflux/**'
              - 'terraform/modules/gateway-route/**'
              - 'terraform/modules/vultr-managed-postgres/**'
              - '.github/workflows/cicd.yaml'
            node-red:
              - 'terraform/applications/node-red/**'
              - '.github/workflows/cicd.yaml'
            ollama:
              - 'terraform/applications/ollama/**'
              - '.github/workflows/cicd.yaml'
            automate:
              - 'fsharp/api/automate/**'
              - 'terraform/modules/gateway-route/**'
              - '.github/workflows/cicd.yaml'
            musync:
              - 'fsharp/api/musync/**'
              - 'terraform/modules/vultr-managed-postgres/**'
              - '.github/workflows/cicd.yaml'

  test-automate-api:
    needs:
      - lint
    runs-on: ubuntu-latest
    env:
      MISE_ENV: ci
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.14
          install: false
          cache: true
      - run: mise install dotnet
      - name: Test
        working-directory: fsharp/api/automate
        run: dotnet test ./AutoMate.Tests

  build-automate-api:
    needs:
      - test-automate-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: app-version
        working-directory: fsharp/api/automate
        run: >
          grep --ignore-case --max-count=1 '<version>' AutoMate/AutoMate.fsproj
          | sed -E
          -e 's|.*<version>(.*)</version>.*|\1-${{ github.ref_name }}.${{ github.run_number }}|i'
          -e 's|[^a-z0-9_.-]+|-|gi'
          -e 's|^|out=|'
          >> "$GITHUB_OUTPUT"
      - name: Build
        working-directory: fsharp/api/automate
        run: docker compose build
        env:
          APP_VERSION: ${{ steps.app-version.outputs.out }}
      - id: op-secrets
        if: github.ref_name == 'main'
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          registry_password: op://Frankenstructure/Vultr Container Registry - Frankistry/password
          registry_urn: op://Frankenstructure/Vultr Container Registry - Frankistry/urn
          registry_username: op://Frankenstructure/Vultr Container Registry - Frankistry/username
      - name: Docker login
        if: github.ref_name == 'main'
        run: >
          docker login
          --username "$REGISTRY_USERNAME"
          --password-stdin <<< "$REGISTRY_PASSWORD"
          "$REGISTRY_URN"
        env:
          REGISTRY_PASSWORD: ${{ steps.op-secrets.outputs.registry_password }}
          REGISTRY_URN: ${{ steps.op-secrets.outputs.registry_urn }}
          REGISTRY_USERNAME: ${{ steps.op-secrets.outputs.registry_username }}
      - name: Push
        if: github.ref_name == 'main'
        working-directory: fsharp/api/automate
        run: docker compose push api
        env:
          APP_VERSION: ${{ steps.app-version.outputs.out }}
    outputs:
      app_version: ${{ steps.app-version.outputs.out }}

  test-musync:
    needs:
      - lint
    runs-on: ubuntu-latest
    env:
      MISE_ENV: ci
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.14
          install: false
          cache: true
      - run: mise install dotnet
      - name: Test
        working-directory: fsharp/api/musync
        run: dotnet test ./Musync.Tests

  build-musync:
    needs:
      - test-musync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: app-version
        working-directory: fsharp/api/musync
        run: >
          grep --ignore-case --max-count=1 '<version>' Musync/Musync.fsproj
          | sed -E
          -e 's|.*<version>(.*)</version>.*|\1-${{ github.ref_name }}.${{ github.run_number }}|i'
          -e 's|[^a-z0-9_.-]+|-|gi'
          -e 's|^|out=|'
          >> "$GITHUB_OUTPUT"
      - name: Build
        working-directory: fsharp/api/musync
        run: docker compose build
        env:
          APP_VERSION: ${{ steps.app-version.outputs.out }}
      - id: op-secrets
        if: github.ref_name == 'main'
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          registry_password: op://Frankenstructure/Vultr Container Registry - Frankistry/password
          registry_urn: op://Frankenstructure/Vultr Container Registry - Frankistry/urn
          registry_username: op://Frankenstructure/Vultr Container Registry - Frankistry/username
      - name: Docker login
        if: github.ref_name == 'main'
        run: >
          docker login
          --username "$REGISTRY_USERNAME"
          --password-stdin <<< "$REGISTRY_PASSWORD"
          "$REGISTRY_URN"
        env:
          REGISTRY_PASSWORD: ${{ steps.op-secrets.outputs.registry_password }}
          REGISTRY_URN: ${{ steps.op-secrets.outputs.registry_urn }}
          REGISTRY_USERNAME: ${{ steps.op-secrets.outputs.registry_username }}
      - name: Push
        if: github.ref_name == 'main'
        working-directory: fsharp/api/musync
        run: docker compose push musync
        env:
          APP_VERSION: ${{ steps.app-version.outputs.out }}
    outputs:
      app_version: ${{ steps.app-version.outputs.out }}

  check-deploy-prod:
    if: github.ref_name == 'main' && needs.changes.outputs.any == 'true'
    environment: production
    needs:
      - lint
      - changes
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying to production!"

  deploy-frankenstructure:
    concurrency:
      group: ${{ github.workflow }}-deploy-frankenstructure
      cancel-in-progress: false
    environment: production
    needs:
      - check-deploy-prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/tofu-deploy
        with:
          stack_path: terraform/infrastructure/frankenstructure
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          needs_kubeconfig: "false"
          op_refs: |
            TF_VAR_cloudflare_api_token=op://Frankenstructure/Cloudflare API Token - frankenstructure/credential
            TF_VAR_vultr_api_key=op://Frankenstructure/Vultr API Key/password

  deploy-observability:
    concurrency:
      group: ${{ github.workflow }}-deploy-observability
      cancel-in-progress: false
    environment: production
    needs:
      - check-deploy-prod
      - deploy-frankenstructure
      # grafana-cloud is now an ExternalSecret; ESO (CRDs + ClusterSecretStore)
      # must exist before this stack applies the ExternalSecret.
      - deploy-external-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/tofu-deploy
        with:
          stack_path: terraform/infrastructure/observability
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          op_refs: |
            TF_VAR_honeycomb_key_id=op://Frankenstructure/Honeycomb.io Management API Key/username
            TF_VAR_honeycomb_key_secret=op://Frankenstructure/Honeycomb.io Management API Key/credential
            TF_VAR_honeycomb_api_key=op://Frankenstructure/Honeycomb.io Configuration API Key/credential
            TF_VAR_grafana_auth=op://Frankenstructure/Grafana Cloud Service Account Token - fungi/credential
            TF_VAR_healthchecksio_api_key=op://Frankenstructure/Healthchecks.io API Key/credential

  deploy-gateway:
    concurrency:
      group: ${{ github.workflow }}-deploy-gateway
      cancel-in-progress: false
    environment: production
    needs:
      - check-deploy-prod
      - deploy-frankenstructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/tofu-deploy
        with:
          stack_path: terraform/infrastructure/gateway
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          op_refs: |
            TF_VAR_cloudflare_api_token=op://Frankenstructure/Cloudflare API Token - frankenstructure/credential
            TF_VAR_github_token=${{ github.token }}
            TF_VAR_github_username=${{ github.triggering_actor }}

  deploy-external-secrets:
    concurrency:
      group: ${{ github.workflow }}-deploy-external-secrets
      cancel-in-progress: false
    environment: production
    needs:
      - check-deploy-prod
      - deploy-frankenstructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/tofu-deploy
        with:
          stack_path: terraform/infrastructure/external-secrets
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # Secret-zero: TF_VAR_op_service_account_token reuses the read-only OP
          # service-account token ESO's ClusterSecretStore authenticates with. It
          # is injected directly (not via op://) because it cannot be sourced
          # through ESO itself (chicken-and-egg).
          op_refs: |
            TF_VAR_op_connect_credentials_json=op://Frankenstructure/1Password Connect - Secrets Automation/credentials_json
            TF_VAR_op_connect_token=op://Frankenstructure/1Password Connect - Secrets Automation/credential
            TF_VAR_op_service_account_token=${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

  deployed-foundation:
    environment: production
    needs:
      - deploy-external-secrets
      - deploy-gateway
      - deploy-observability
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deployed foundational infrastructure!"

  deploy-httpbin:
    if: needs.changes.outputs.httpbin == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-httpbin
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/tofu-deploy
        with:
          stack_path: terraform/applications/httpbin
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

  deploy-ntfy:
    if: needs.changes.outputs.ntfy == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-ntfy
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/tofu-deploy
        with:
          stack_path: terraform/applications/ntfy
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

  deploy-miniflux:
    if: needs.changes.outputs.miniflux == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-miniflux
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/tofu-deploy
        with:
          stack_path: terraform/applications/miniflux
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          op_refs: |
            TF_VAR_github_token=${{ github.token }}
            TF_VAR_github_username=${{ github.triggering_actor }}
            TF_VAR_miniflux_postgres_password=op://Frankenstructure/Postgres - Miniflux/password
            TF_VAR_vultr_api_key=op://Frankenstructure/Vultr API Key/password

  deploy-node-red:
    if: needs.changes.outputs.node-red == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-node-red
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/tofu-deploy
        with:
          stack_path: terraform/applications/node-red
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          op_refs: |
            TF_VAR_github_token=${{ github.token }}
            TF_VAR_github_username=${{ github.triggering_actor }}

  deploy-ollama:
    if: needs.changes.outputs.ollama == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-ollama
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/tofu-deploy
        with:
          stack_path: terraform/applications/ollama
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

  deploy-automate-api:
    if: needs.changes.outputs.automate == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-automate-api
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - build-automate-api
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/tofu-deploy
        with:
          stack_path: fsharp/api/automate/terraform
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # OAuth client creds (DROPBOX_/TODOIST_) are no longer injected here:
          # the ESO ExternalSecret "automate-onepassword" syncs them from
          # 1Password into the cluster (see external_secret_automate.tf).
          op_refs: |
            TF_VAR_app_version=${{ needs.build-automate-api.outputs.app_version }}
            TF_VAR_automate_postgres_password=op://Frankenstructure/Postgres - AutoMate/password
            TF_VAR_dockerconfigjson=op://Frankenstructure/Vultr Container Registry - Frankistry/credential
            TF_VAR_vultr_api_key=op://Frankenstructure/Vultr API Key/password

  deploy-musync:
    if: needs.changes.outputs.musync == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-musync
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - build-musync
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/tofu-deploy
        with:
          stack_path: fsharp/api/musync/terraform
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # SONGKICK_ICS_URL, SETLIST_FM_API_KEY, USER_EMAIL, and SMTP_* are synced
          # from 1Password by the ESO ExternalSecret "musync-onepassword" (see
          # external_secret_musync.tf), so they are not injected here.
          op_refs: |
            TF_VAR_app_version=${{ needs.build-musync.outputs.app_version }}
            TF_VAR_dockerconfigjson=op://Frankenstructure/Vultr Container Registry - Frankistry/credential
            TF_VAR_vultr_api_key=op://Frankenstructure/Vultr API Key/password
