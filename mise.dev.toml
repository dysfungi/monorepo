# Dev-only mise environment (active when MISE_ENV=dev, the committed default in .miserc.toml).
# Holds the 1Password/vultr-cli/git-config execs so base .mise.toml stays exec-free —
# CI sets MISE_ENV=ci to exclude this file (keeps secrets out of CI mise).
#
# CACHING STRATEGY:
#   Remote secrets (op read, curl): 24h TTL via exec() cache_key+cache_duration.
#   Vultr-derived values (AWS_*, REGISTRY): no-TTL exec() cache_key (same semantics
#     as the former secrets/frankenstorage.yaml and secrets/frankistry.json files,
#     but shared cross-terminal via ~/.cache/mise instead of per-repo files).
#   All cache is per-machine in ~/.cache/mise and shared across all terminals.
#   To force refresh: `mise cache clear` (all), or per-key: not supported directly.
#
# QUOTING NOTE: exec(command=...) values use TOML double-quoted strings so that
#   op:// references containing spaces can be wrapped in single quotes within the
#   shell command, e.g. exec(command="op read 'op://vault/item with spaces/field'").
#   Vultr jq commands use backslash-escaped inner double quotes.
#
# NOTE: [settings] experimental = true (required for exec() template caching) lives
#   in the base .mise.toml, which is always loaded alongside this file.

[env]
# ── Identity ─────────────────────────────────────────────────────────────────
GITHUB_USERNAME = "{{ exec(command='git config --get user.email') }}"

# ── Remote secrets (24h TTL, cross-terminal) ─────────────────────────────────
VULTR_API_KEY        = "{{ exec(command=\"op read 'op://Frankenstructure/Vultr API Key/password'\", cache_key='vultr_api_key', cache_duration='24h') }}"
CLOUDFLARE_API_TOKEN = "{{ exec(command=\"op read 'op://Frankenstructure/Cloudflare API Token - frankenstructure/credential'\", cache_key='cloudflare_token', cache_duration='24h') }}"

# ── Vultr-derived values (week-cached; replace secrets/frankenstorage.yaml and
#    secrets/frankistry.json; require VULTR_API_KEY — rendered above — in env) ──
#  ROBUST OFF-PATH INVOCATION: vultr-cli is a mise [tools] binary, but [tools]
#    are NOT on PATH while [env] itself renders, so a bare `vultr-cli` is "command
#    not found" and its pipe to jq silently yields "" (the bug this replaces).
#    The mise shim can't be used either: the shim is a symlink back to mise, so
#    calling it mid-render RE-ENTERS mise (re-renders [env] → recursion) and
#    aborts ("failed to parse template"). Same for `mise x` / `mise which`. We
#    therefore invoke the RAW install binary by absolute path — PATH-independent
#    and mise-independent (no re-entry). `latest` tracks the highest installed
#    version; the [tools] pin above is the source of truth. (jq resolves off the
#    mise PATH via system/homebrew.)
#  CACHE: cache_duration='168h' (~1 week) — avoids a Vultr API call every shell.
#  FAIL-LOUD / NEVER-CACHE-EMPTY: `jq -er` exits non-zero on empty input (failed
#    lookup) or no-match; `|| exit 1` and the `[ -n ]` guard propagate it. mise's
#    exec runs under `sh -c -o errexit`, and a non-zero exec exit makes mise
#    REFUSE to cache — critical with a 1-week TTL, where a cached "" would persist
#    for a week. Only a real, non-empty value is ever printed (and thus cached).
AWS_ACCESS_KEY_ID     = "{{ exec(command='v=$(\"${MISE_DATA_DIR:-$HOME/.local/share/mise}/installs/github-vultr-vultr-cli/latest/vultr-cli\" --output=json object-storage list | jq -er \".object_storages[] | select(.label == \\\"frankenstorage\\\") | .s3_access_key\") || exit 1; [ -n \"$v\" ] || exit 1; printf %s \"$v\"', cache_key='aws_akid', cache_duration='168h') }}"
AWS_SECRET_ACCESS_KEY = "{{ exec(command='v=$(\"${MISE_DATA_DIR:-$HOME/.local/share/mise}/installs/github-vultr-vultr-cli/latest/vultr-cli\" --output=json object-storage list | jq -er \".object_storages[] | select(.label == \\\"frankenstorage\\\") | .s3_secret_key\") || exit 1; [ -n \"$v\" ] || exit 1; printf %s \"$v\"', cache_key='aws_secret', cache_duration='168h') }}"
REGISTRY              = "{{ exec(command='v=$(\"${MISE_DATA_DIR:-$HOME/.local/share/mise}/installs/github-vultr-vultr-cli/latest/vultr-cli\" --output=json container-registry list | jq -er \".registries[] | select(.name == \\\"frankistry\\\") | .urn\") || exit 1; [ -n \"$v\" ] || exit 1; printf %s \"$v\"', cache_key='registry_urn', cache_duration='168h') }}"

