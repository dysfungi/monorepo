name: Lint

on:
  workflow_call:
    inputs:
      app_version:
        default: latest-lint
        required: false
        type: string
      registry:
        default: sjc.vultrcr.com/frankistry
        required: false
        type: string

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    env:
      MISE_ENV: ci
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.14
          install: true
          cache: true
      - name: Setup Fantomas
        run: dotnet tool restore
      - name: Run pre-commit
        run: mise run lint
