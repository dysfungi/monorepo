apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: grafana-cloud
    creationPolicy: Owner
  data:
    # 1Password Connect (onepassword) provider: remoteRef.key is the item TITLE;
    # the field goes in a separate property:. The vault (Frankenstructure) is
    # supplied by the ClusterSecretStore, so it is omitted here.
    - secretKey: api-key
      remoteRef:
        key: Grafana Cloud API Key - fungi
        property: credential
    - secretKey: instance-id
      remoteRef:
        key: Grafana Cloud API Key - fungi
        property: username
