apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frankenbot-anthropic
  namespace: frankenbot
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: frankenbot-anthropic
    creationPolicy: Owner
  # secretKey MUST match the env var frankenbot/triage.py reads (the claude CLI
  # convention): ANTHROPIC_API_KEY.
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: Frankenbot Anthropic/api-key
