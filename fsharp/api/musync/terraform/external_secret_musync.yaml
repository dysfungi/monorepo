apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: musync-onepassword
  namespace: musync
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: musync-onepassword
    creationPolicy: Owner
  # The onepassword (Connect) provider encodes the field into `key` using
  # 1Password secret-reference syntax `<item>/[section/]<field>` (no separate
  # `property`). The vault (Frankenstructure) is supplied by the ClusterSecretStore,
  # so it is omitted here. secretKeys are the exact env var names FsConfig reads
  # (Config.fs): Smtp.Username -> SMTP_USERNAME, etc.
  data:
    - secretKey: SONGKICK_ICS_URL
      remoteRef:
        key: Songkick - Musync/ics_url
    - secretKey: SETLIST_FM_API_KEY
      remoteRef:
        key: Setlist.fm API Key - Musync/credential
    # The user's own Proton mailbox — RECIPIENT of the calendar self-invite AND
    # the setlist nudge (Config.UserEmail -> USER_EMAIL). MUST exist in 1Password
    # before deploy or ESO sync fails loud (verify item/field at live-apply).
    - secretKey: USER_EMAIL
      remoteRef:
        key: User - Musync/email
    # SMTP is a SECTIONED 1Password item: section `smtp` with fields server/port/
    # username/token/security. Proton's `security = "TLS"` => implicit TLS on
    # connect (Email.secureSocketOptionsFor). SMTP_PASSWORD <- token; SMTP_FROM <-
    # username (Proton requires From == the authenticated address).
    - secretKey: SMTP_HOST
      remoteRef:
        key: ProtonMail SMTP - noreply/smtp/server
    - secretKey: SMTP_PORT
      remoteRef:
        key: ProtonMail SMTP - noreply/smtp/port
    - secretKey: SMTP_USERNAME
      remoteRef:
        key: ProtonMail SMTP - noreply/smtp/username
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: ProtonMail SMTP - noreply/smtp/token
    - secretKey: SMTP_SECURITY
      remoteRef:
        key: ProtonMail SMTP - noreply/smtp/security
    - secretKey: SMTP_FROM
      remoteRef:
        key: ProtonMail SMTP - noreply/smtp/username
