name: Continuous Integration & Deployment

on:
  push:
    branches:
      - main
  pull_request:

permissions: read-all

jobs:
  lint:
    uses: ./.github/workflows/lint.yaml

  changes:
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.filter.outputs.any }}
      httpbin: ${{ steps.filter.outputs.httpbin }}
      miniflux: ${{ steps.filter.outputs.miniflux }}
      node-red: ${{ steps.filter.outputs.node-red }}
      ollama: ${{ steps.filter.outputs.ollama }}
      automate: ${{ steps.filter.outputs.automate }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            any:
              - 'terraform/infrastructure/**'
              - 'terraform/applications/**'
              - 'terraform/modules/**'
              - 'fsharp/api/automate/**'
              - '.github/workflows/cicd.yaml'
              - '.mise.toml'
            httpbin:
              - 'terraform/applications/httpbin/**'
              - 'terraform/modules/gateway-route/**'
              - '.github/workflows/cicd.yaml'
            miniflux:
              - 'terraform/applications/miniflux/**'
              - 'terraform/modules/gateway-route/**'
              - 'terraform/modules/vultr-managed-postgres/**'
              - '.github/workflows/cicd.yaml'
            node-red:
              - 'terraform/applications/node-red/**'
              - '.github/workflows/cicd.yaml'
            ollama:
              - 'terraform/applications/ollama/**'
              - '.github/workflows/cicd.yaml'
            automate:
              - 'fsharp/api/automate/**'
              - 'terraform/modules/gateway-route/**'
              - '.github/workflows/cicd.yaml'

  test-automate-api:
    needs:
      - lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.202
      - name: Test
        working-directory: fsharp/api/automate
        run: dotnet test ./AutoMate.Tests

  build-automate-api:
    needs:
      - test-automate-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: app-version
        working-directory: fsharp/api/automate
        run: >
          grep --ignore-case --max-count=1 '<version>' AutoMate/AutoMate.fsproj
          | sed -E
          -e 's|.*<version>(.*)</version>.*|\1-${{ github.ref_name }}.${{ github.run_number }}|i'
          -e 's|[^a-z0-9_.-]+|-|gi'
          -e 's|^|out=|'
          >> "$GITHUB_OUTPUT"
      - name: Build
        working-directory: fsharp/api/automate
        run: docker compose build
        env:
          APP_VERSION: ${{ steps.app-version.outputs.out }}
      - id: op-secrets
        if: github.ref_name == 'main'
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          registry_password: op://Frankenstructure/Vultr Container Registry - Frankistry/password
          registry_urn: op://Frankenstructure/Vultr Container Registry - Frankistry/urn
          registry_username: op://Frankenstructure/Vultr Container Registry - Frankistry/username
      - name: Docker login
        if: github.ref_name == 'main'
        run: >
          docker login
          --username "$REGISTRY_USERNAME"
          --password-stdin <<< "$REGISTRY_PASSWORD"
          "$REGISTRY_URN"
        env:
          REGISTRY_PASSWORD: ${{ steps.op-secrets.outputs.registry_password }}
          REGISTRY_URN: ${{ steps.op-secrets.outputs.registry_urn }}
          REGISTRY_USERNAME: ${{ steps.op-secrets.outputs.registry_username }}
      - name: Push
        if: github.ref_name == 'main'
        working-directory: fsharp/api/automate
        run: docker compose push api
        env:
          APP_VERSION: ${{ steps.app-version.outputs.out }}
    outputs:
      app_version: ${{ steps.app-version.outputs.out }}

  check-deploy-prod:
    if: github.ref_name == 'main' && needs.changes.outputs.any == 'true'
    environment: production
    needs:
      - lint
      - changes
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying to production!"

  deploy-frankenstructure:
    concurrency:
      group: ${{ github.workflow }}-deploy-frankenstructure
      cancel-in-progress: false
    environment: production
    needs:
      - check-deploy-prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
      - id: op-secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          cloudflare_api_token: op://Frankenstructure/Cloudflare API Token - frankenstructure/credential
          s3_access_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/access_key
          s3_secret_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/secret_key
          vultr_api_key: op://Frankenstructure/Vultr API Key/password
      - name: Initialize tofu
        working-directory: terraform/infrastructure/frankenstructure
        run: tofu init -input=false -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_cloudflare_api_token: ${{ steps.op-secrets.outputs.cloudflare_api_token }}
          TF_VAR_vultr_api_key: ${{ steps.op-secrets.outputs.vultr_api_key }}
      - name: Deploy
        working-directory: terraform/infrastructure/frankenstructure
        run: tofu apply -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_cloudflare_api_token: ${{ steps.op-secrets.outputs.cloudflare_api_token }}
          TF_VAR_vultr_api_key: ${{ steps.op-secrets.outputs.vultr_api_key }}

  deploy-observability:
    concurrency:
      group: ${{ github.workflow }}-deploy-observability
      cancel-in-progress: false
    environment: production
    needs:
      - check-deploy-prod
      - deploy-frankenstructure
      # grafana-cloud is now an ExternalSecret; ESO (CRDs + ClusterSecretStore)
      # must exist before this stack applies the ExternalSecret.
      - deploy-external-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
      - id: op-secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # grafana_cloud_* removed: now sourced by ESO from 1Password.
          honeycomb_key_id: op://Frankenstructure/Honeycomb.io Management API Key/username
          honeycomb_key_secret: op://Frankenstructure/Honeycomb.io Management API Key/credential
          honeycomb_api_key: op://Frankenstructure/Honeycomb.io Configuration API Key/credential
          grafana_auth: op://Frankenstructure/Grafana Cloud Service Account Token - fungi/credential
          healthchecksio_api_key: op://Frankenstructure/Healthchecks.io API Key/credential
          kubeconfig: op://Frankenstructure/Kubeconfig - frank8s/kubeconfig
          s3_access_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/access_key
          s3_secret_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/secret_key
      - id: kubeconfig-path
        run: |
          base64 --decode > "kubeconfig.yaml" <<< "${{ steps.op-secrets.outputs.kubeconfig }}"
          echo "out=$PWD/kubeconfig.yaml" >> "$GITHUB_OUTPUT"
      - name: Initialize tofu
        working-directory: terraform/infrastructure/observability
        run: tofu init -input=false -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_healthchecksio_api_key: ${{ steps.op-secrets.outputs.healthchecksio_api_key }}
          TF_VAR_honeycomb_key_id: ${{ steps.op-secrets.outputs.honeycomb_key_id }}
          TF_VAR_honeycomb_key_secret: ${{ steps.op-secrets.outputs.honeycomb_key_secret }}
          TF_VAR_honeycomb_api_key: ${{ steps.op-secrets.outputs.honeycomb_api_key }}
          TF_VAR_grafana_auth: ${{ steps.op-secrets.outputs.grafana_auth }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}
      - name: Deploy
        working-directory: terraform/infrastructure/observability
        run: tofu apply -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_healthchecksio_api_key: ${{ steps.op-secrets.outputs.healthchecksio_api_key }}
          TF_VAR_honeycomb_key_id: ${{ steps.op-secrets.outputs.honeycomb_key_id }}
          TF_VAR_honeycomb_key_secret: ${{ steps.op-secrets.outputs.honeycomb_key_secret }}
          TF_VAR_honeycomb_api_key: ${{ steps.op-secrets.outputs.honeycomb_api_key }}
          TF_VAR_grafana_auth: ${{ steps.op-secrets.outputs.grafana_auth }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}

  deploy-gateway:
    concurrency:
      group: ${{ github.workflow }}-deploy-gateway
      cancel-in-progress: false
    environment: production
    needs:
      - check-deploy-prod
      - deploy-frankenstructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
      - id: op-secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          cloudflare_api_token: op://Frankenstructure/Cloudflare API Token - frankenstructure/credential
          kubeconfig: op://Frankenstructure/Kubeconfig - frank8s/kubeconfig
          s3_access_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/access_key
          s3_secret_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/secret_key
      - id: kubeconfig-path
        run: |
          base64 --decode > "kubeconfig.yaml" <<< "${{ steps.op-secrets.outputs.kubeconfig }}"
          echo "out=$PWD/kubeconfig.yaml" >> "$GITHUB_OUTPUT"
      - name: Initialize tofu
        working-directory: terraform/infrastructure/gateway
        run: tofu init -input=false -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_cloudflare_api_token: ${{ steps.op-secrets.outputs.cloudflare_api_token }}
          TF_VAR_github_token: ${{ github.token }}
          TF_VAR_github_username: ${{ github.triggering_actor }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}
      - name: Deploy
        working-directory: terraform/infrastructure/gateway
        run: tofu apply -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_cloudflare_api_token: ${{ steps.op-secrets.outputs.cloudflare_api_token }}
          TF_VAR_github_token: ${{ github.token }}
          TF_VAR_github_username: ${{ github.triggering_actor }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}

  deploy-external-secrets:
    concurrency:
      group: ${{ github.workflow }}-deploy-external-secrets
      cancel-in-progress: false
    environment: production
    needs:
      - check-deploy-prod
      - deploy-frankenstructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
      - id: op-secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          kubeconfig: op://Frankenstructure/Kubeconfig - frank8s/kubeconfig
          op_connect_credentials_json: op://Frankenstructure/1Password Connect - Secrets Automation/credentials_json
          op_connect_token: op://Frankenstructure/1Password Connect - Secrets Automation/credential
          s3_access_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/access_key
          s3_secret_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/secret_key
      - id: kubeconfig-path
        run: |
          base64 --decode > "kubeconfig.yaml" <<< "${{ steps.op-secrets.outputs.kubeconfig }}"
          echo "out=$PWD/kubeconfig.yaml" >> "$GITHUB_OUTPUT"
      - name: Initialize tofu
        working-directory: terraform/infrastructure/external-secrets
        run: tofu init -input=false -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          # Secret-zero: the read-only OP service-account token ESO uses to
          # authenticate its onepasswordSDK ClusterSecretStore. Reuses the
          # existing read-only token; injected directly because it cannot be
          # sourced through ESO itself (chicken-and-egg).
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}
          TF_VAR_op_connect_credentials_json: ${{ steps.op-secrets.outputs.op_connect_credentials_json }}
          TF_VAR_op_connect_token: ${{ steps.op-secrets.outputs.op_connect_token }}
          TF_VAR_op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      - name: Deploy
        working-directory: terraform/infrastructure/external-secrets
        run: tofu apply -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}
          TF_VAR_op_connect_credentials_json: ${{ steps.op-secrets.outputs.op_connect_credentials_json }}
          TF_VAR_op_connect_token: ${{ steps.op-secrets.outputs.op_connect_token }}
          TF_VAR_op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

  deployed-foundation:
    environment: production
    needs:
      - deploy-external-secrets
      - deploy-gateway
      - deploy-observability
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deployed foundational infrastructure!"

  deploy-httpbin:
    if: needs.changes.outputs.httpbin == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-httpbin
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
      - id: op-secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          kubeconfig: op://Frankenstructure/Kubeconfig - frank8s/kubeconfig
          s3_access_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/access_key
          s3_secret_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/secret_key
      - id: kubeconfig-path
        run: |
          base64 --decode > "kubeconfig.yaml" <<< "${{ steps.op-secrets.outputs.kubeconfig }}"
          echo "out=$PWD/kubeconfig.yaml" >> "$GITHUB_OUTPUT"
      - name: Initialize tofu
        working-directory: terraform/applications/httpbin
        run: tofu init -input=false -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}
      - name: Deploy
        working-directory: terraform/applications/httpbin
        run: tofu apply -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}

  deploy-miniflux:
    if: needs.changes.outputs.miniflux == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-miniflux
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
      - id: op-secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # miniflux admin creds (ADMIN_USERNAME/ADMIN_PASSWORD) are now sourced
          # from 1Password by ESO (miniflux-admin ExternalSecret), not via TF_VARs.
          miniflux_postgres_password: op://Frankenstructure/Postgres - Miniflux/password
          kubeconfig: op://Frankenstructure/Kubeconfig - frank8s/kubeconfig
          s3_access_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/access_key
          s3_secret_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/secret_key
          vultr_api_key: op://Frankenstructure/Vultr API Key/password
      - id: kubeconfig-path
        run: |
          base64 --decode > "kubeconfig.yaml" <<< "${{ steps.op-secrets.outputs.kubeconfig }}"
          echo "out=$PWD/kubeconfig.yaml" >> "$GITHUB_OUTPUT"
      - name: Initialize tofu
        working-directory: terraform/applications/miniflux
        run: tofu init -input=false -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_github_token: ${{ github.token }}
          TF_VAR_github_username: ${{ github.triggering_actor }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}
          TF_VAR_miniflux_postgres_password: ${{ steps.op-secrets.outputs.miniflux_postgres_password }}
          TF_VAR_vultr_api_key: ${{ steps.op-secrets.outputs.vultr_api_key }}
      - name: Deploy
        working-directory: terraform/applications/miniflux
        run: tofu apply -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_github_token: ${{ github.token }}
          TF_VAR_github_username: ${{ github.triggering_actor }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}
          TF_VAR_miniflux_postgres_password: ${{ steps.op-secrets.outputs.miniflux_postgres_password }}
          TF_VAR_vultr_api_key: ${{ steps.op-secrets.outputs.vultr_api_key }}

  deploy-node-red:
    if: needs.changes.outputs.node-red == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-node-red
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
      - id: op-secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          kubeconfig: op://Frankenstructure/Kubeconfig - frank8s/kubeconfig
          s3_access_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/access_key
          s3_secret_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/secret_key
      - id: kubeconfig-path
        run: |
          base64 --decode > "kubeconfig.yaml" <<< "${{ steps.op-secrets.outputs.kubeconfig }}"
          echo "out=$PWD/kubeconfig.yaml" >> "$GITHUB_OUTPUT"
      - name: Initialize tofu
        working-directory: terraform/applications/node-red
        run: tofu init -input=false -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_github_token: ${{ github.token }}
          TF_VAR_github_username: ${{ github.triggering_actor }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}
      - name: Deploy
        working-directory: terraform/applications/node-red
        run: tofu apply -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_github_token: ${{ github.token }}
          TF_VAR_github_username: ${{ github.triggering_actor }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}

  deploy-ollama:
    if: needs.changes.outputs.ollama == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-ollama
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
      - id: op-secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          kubeconfig: op://Frankenstructure/Kubeconfig - frank8s/kubeconfig
          s3_access_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/access_key
          s3_secret_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/secret_key
      - id: kubeconfig-path
        run: |
          base64 --decode > "kubeconfig.yaml" <<< "${{ steps.op-secrets.outputs.kubeconfig }}"
          echo "out=$PWD/kubeconfig.yaml" >> "$GITHUB_OUTPUT"
      - name: Initialize tofu
        working-directory: terraform/applications/ollama
        run: tofu init -input=false -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}
      - name: Deploy
        working-directory: terraform/applications/ollama
        run: tofu apply -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}

  deploy-automate-api:
    if: needs.changes.outputs.automate == 'true'
    concurrency:
      group: ${{ github.workflow }}-deploy-automate-api
      cancel-in-progress: false
    environment: production
    needs:
      - deployed-foundation
      - build-automate-api
      - changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v2
      - id: op-secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # OAuth client credentials (DROPBOX_/TODOIST_) are no longer injected
          # here: the ESO ExternalSecret "automate-onepassword" syncs them from
          # 1Password directly into the cluster (see external_secret_automate.tf).
          automate_postgres_password: op://Frankenstructure/Postgres - AutoMate/password
          dockerconfigjson: op://Frankenstructure/Vultr Container Registry - Frankistry/credential
          kubeconfig: op://Frankenstructure/Kubeconfig - frank8s/kubeconfig
          s3_access_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/access_key
          s3_secret_key: op://Frankenstructure/Vultr Object Storage - Frankenstorage/secret_key
          vultr_api_key: op://Frankenstructure/Vultr API Key/password
      - id: kubeconfig-path
        run: |
          base64 --decode > "kubeconfig.yaml" <<< "${{ steps.op-secrets.outputs.kubeconfig }}"
          echo "out=$PWD/kubeconfig.yaml" >> "$GITHUB_OUTPUT"
      - name: Initialize tofu
        working-directory: fsharp/api/automate/terraform
        run: tofu init -input=false -upgrade
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_app_version: ${{ needs.build-automate-api.outputs.app_version }}
          TF_VAR_automate_postgres_password: ${{ steps.op-secrets.outputs.automate_postgres_password }}
          TF_VAR_dockerconfigjson: ${{ steps.op-secrets.outputs.dockerconfigjson }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}
          TF_VAR_vultr_api_key: ${{ steps.op-secrets.outputs.vultr_api_key }}
      - name: Deploy
        working-directory: fsharp/api/automate/terraform
        run: tofu apply -auto-approve -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.op-secrets.outputs.s3_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.op-secrets.outputs.s3_secret_key }}
          TF_VAR_app_version: ${{ needs.build-automate-api.outputs.app_version }}
          TF_VAR_automate_postgres_password: ${{ steps.op-secrets.outputs.automate_postgres_password }}
          TF_VAR_dockerconfigjson: ${{ steps.op-secrets.outputs.dockerconfigjson }}
          TF_VAR_kubeconfig_path: ${{ steps.kubeconfig-path.outputs.out }}
          TF_VAR_vultr_api_key: ${{ steps.op-secrets.outputs.vultr_api_key }}
