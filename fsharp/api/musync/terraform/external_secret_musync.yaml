apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: musync-onepassword
  namespace: musync
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: musync-onepassword
    creationPolicy: Owner
  # This store is the 1Password *Connect* provider. `key` is the item Title (no
  # slashes); `property` is the bare field label. The provider IGNORES sections
  # and matches field labels across the item's flat field list, so field labels
  # must be UNIQUE within an item. secretKeys are the exact env var names FsConfig
  # reads (Config.fs): Smtp.Username -> SMTP_USERNAME, etc.
  data:
    - secretKey: SONGKICK_ICS_URL
      remoteRef:
        key: Songkick ICS URL - Plans
        property: ics url
    - secretKey: SETLIST_FM_API_KEY
      remoteRef:
        key: Setlist.fm API Key - Musync
        property: credential
    # The user's own Proton mailbox — RECIPIENT of the calendar self-invite AND
    # the setlist nudge (Config.UserEmail -> USER_EMAIL). MUST exist in 1Password
    # before deploy or ESO sync fails loud (verify item/field at live-apply).
    - secretKey: USER_EMAIL
      remoteRef:
        key: Notification Email - Musync
        property: email
    # Proton SMTP item fields (server/port/username/token/security). Proton's
    # `security = "TLS"` => implicit TLS on connect (Email.secureSocketOptionsFor).
    # SMTP_PASSWORD <- token; SMTP_FROM <- username (Proton requires From == the
    # authenticated address).
    - secretKey: SMTP_HOST
      remoteRef:
        key: ProtonMail SMTP - noreply
        property: server
    - secretKey: SMTP_PORT
      remoteRef:
        key: ProtonMail SMTP - noreply
        property: port
    - secretKey: SMTP_USERNAME
      remoteRef:
        key: ProtonMail SMTP - noreply
        property: username
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: ProtonMail SMTP - noreply
        property: token
    - secretKey: SMTP_SECURITY
      remoteRef:
        key: ProtonMail SMTP - noreply
        property: security
    - secretKey: SMTP_FROM
      remoteRef:
        key: ProtonMail SMTP - noreply
        property: username
