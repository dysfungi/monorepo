apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miniflux-admin
  namespace: miniflux
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: miniflux-admin
    creationPolicy: Owner
  data:
    # 1Password Connect (onepassword) provider: remoteRef.key is the item TITLE;
    # the field goes in a separate property:. The vault (Frankenstructure) is
    # supplied by the ClusterSecretStore, so it is omitted here.
    - secretKey: ADMIN_USERNAME
      remoteRef:
        key: Miniflux - frank.sh
        property: username
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: Miniflux - frank.sh
        property: password
